<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRAFT 2K</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="pics/cabecalho.png" alt="Cabeçalho" class="header-image">
</header>

<main class="container">

  <!-- Jogadores -->
  <section class="card">
    <h2><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>JOGADORES</h2>

    <div id="players"></div>

    <div class="actions">
      <button id="draftBtn"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>DRAFT</button>
      <button id="resetPlayers"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>RESETAR</button>
    </div>

    <div class="wheel-container positions">
      <div class="wheel small" id="wheelPositions">
        <div class="divider d1"></div>
        <div class="divider d2"></div>
        <div class="divider d3"></div>
        <div class="divider d4"></div>
        <div class="divider d5"></div>
        <div class="wedge w1">PG</div>
        <div class="wedge w2">SG</div>
        <div class="wedge w3">SF</div>
        <div class="wedge w4">PF</div>
        <div class="wedge w5">C</div>
      </div>
      <button id="spinPositions"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>SORTEAR</button>
    </div>
  </section>

  <!-- Card central -->
  <section class="card center">
    <h2><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Sorteio dos Jogadores</h2>
    <div class="wheel-container">
      <div class="wheel big" id="wheelPlayers">
        <span class="half-label left"></span>
        <span class="half-label right"></span>
      </div>
      <div class="positions" id="posButtons"></div>
    </div>
    <div class="actions">
      <button id="spinPlayers"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>SORTEAR</button>
    </div>
  </section>

  <!-- Times -->
  <section class="card">
    <h2><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2v20"/><path d="M2 12h20"/><path d="M4.9 4.9c2 2 3.1 4.7 3.1 7.1s-1.1 5.1-3.1 7.1"/><path d="M19.1 4.9c-2 2-3.1 4.7-3.1 7.1s1.1 5.1 3.1 7.1"/></svg>Divisão dos Times</h2>
    <p class="instruction-text"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -3px; margin-right: 6px;"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1.45.62 2.76 1.5 3.5.76.76 1.23 1.52 1.41 2.5"/></svg>O jogador sorteado na roleta vai para o <strong class="neon-text">time 1</strong> e o não sorteado para o <strong style="color: #6E00B3; text-shadow: 0 0 10px rgba(110, 0, 179, 0.4);">time 2</strong>.</p>
    <h3 class="team-title"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7CFF00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2v20"/><path d="M2 12h20"/><path d="M4.9 4.9c2 2 3.1 4.7 3.1 7.1s-1.1 5.1-3.1 7.1"/><path d="M19.1 4.9c-2 2-3.1 4.7-3.1 7.1s1.1 5.1 3.1 7.1"/></svg>TIME 1</h3>
    <div id="team1"></div>
    <h3 class="team-title"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6E00B3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2v20"/><path d="M2 12h20"/><path d="M4.9 4.9c2 2 3.1 4.7 3.1 7.1s-1.1 5.1-3.1 7.1"/><path d="M19.1 4.9c-2 2-3.1 4.7-3.1 7.1s1.1 5.1 3.1 7.1"/></svg>TIME 2</h3>
    <div id="team2"></div>
    <div class="actions">
      <button id="showTeamsBtn"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>EXIBIR TIMES</button>
    </div>
  </section>

</main>

<!-- Alerta customizado -->
<div id="customAlert" class="custom-alert">
  <div class="alert-content">
    <p id="alertMessage"></p>
    <button id="alertOk">OK</button>
  </div>
</div>

<!-- Modal exibir times -->
<div id="teamsModal" class="custom-alert">
  <div class="teams-modal-content" id="teamsModalContent">
    <button id="closeTeamsModal" class="close-modal-btn"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
    <h2 style="justify-content: center; margin-bottom: 20px; font-size: 1.2rem;">ESCALAÇÃO FINAL</h2>
    
    <div class="teams-modal-body">
      <div class="team-col">
        <h3 class="team-title" style="justify-content: center; color: var(--neon-green);">TIME 1</h3>
        <div id="modalTeam1" class="modal-list"></div>
      </div>
      <div class="modal-divider"></div>
      <div class="team-col">
        <h3 class="team-title" style="justify-content: center; color: var(--primary-purple);">TIME 2</h3>
        <div id="modalTeam2" class="modal-list"></div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
